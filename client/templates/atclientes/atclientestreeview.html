<template name="atClientesTreeview">

	<div class="col-xs-3 col-sm-3">
		<h4><b>Datos del cliente {{treeVar}}</b></h4>

		<div class="list-group">
			<a href="{{pathFor 'clientesShowTemplate'}}" class="list-group-item active">{{>clienteNombre}}</a>
			<a href="{{pathFor 'cuentasListTemplate'}}" class="list-group-item"><span class="badge">{{cuentasCount}}</span>Cuentas</a>
			<a href="{{pathFor 'contratosListTemplate'}}" class="list-group-item"><span class="badge">{{contratosCount}}</span>Contratos</a>
			<a href="#" class="list-group-item">Suministros</a>
			<a href="#" class="list-group-item">Medidores</a>
			<a href="#" class="list-group-item">Ordenes de Campo</a>
			<a href="#" class="list-group-item">Facturas</a>
			<a href="#" class="list-group-item">Otros Cargos</a>
			<a href="#" class="list-group-item">Acuerdos</a>
			<a href="#" class="list-group-item">Reclamos</a>
			<a href="#" class="list-group-item">Contactos</a>
		</div>
	</div>
</template>
