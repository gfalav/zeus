<template name="atClientesTreeview">
	<p>Datos del cliente</p>

	<a href="{{pathFor 'clientesShowTemplate'}}" class="list-group-item">{{treeVar.cliente.apellido}}</a>

	{{#each treeVar.cliente.cuentas}}
		<a href="{{ pathFor 'cuentasShowTemplate'}}" class="list-group-item">Cuenta: {{>cuentaNombre}}</a>
		{{#each this.contratos}}
			<a href="{{ pathFor 'contratosShowTemplate'}}" class="list-group-item">Contrato: {{>contratoNombre}}</a>
		{{/each}}
	{{/each}}
			 
</template>
